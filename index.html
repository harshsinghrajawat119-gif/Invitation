<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Open Invitation</title>
  <style>
    :root{--bg:#0b0b0b;--card:#111;--accent:#d4af37}
    html,body{height:100%;margin:0}
    body{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#070707,var(--bg));color:#fff;font-family:Inter,Arial,Helvetica,sans-serif}
    .card{background:linear-gradient(180deg,#0f0f0f,#080808);padding:28px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.6);text-align:center;max-width:420px;width:88%}
    h1{margin:0 0 8px;font-size:20px;font-weight:600}
    p{margin:6px 0 16px;color:#cfcfcf}
    .btn{display:inline-block;padding:12px 20px;border-radius:10px;background:var(--accent);color:#091015;text-decoration:none;font-weight:700}
    .hint{margin-top:12px;font-size:12px;color:#9b9b9b}
    code{background:rgba(255,255,255,0.03);padding:2px 6px;border-radius:4px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Law Chambers Invitation</h1>
    <p>Click the button below to open the invitation.</p>
    <a class="btn" href="qr.html" target="_blank" rel="noopener">Open Invitation</a>
    <p class="hint">Place this file next to <code>qr.html</code> if the link doesn't work, then open this file in your browser.</p>
  </div>
</body>
</html>
